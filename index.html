<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANR E-Commerce Shop</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 15px;
            background-color: var(--tg-theme-bg-color, #f4f6f9);
            color: var(--tg-theme-text-color, #333);
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        .header h1 {
            color: var(--tg-theme-button-color, #0088cc);
            margin: 5px 0;
            font-size: 24px;
        }
        /* ប្លុកបង្ហាញទំនិញ (Products Grid) */
        .products-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .product-card {
            background: var(--tg-theme-secondary-bg-color, #ffffff);
            border-radius: 12px;
            padding: 10px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .product-img {
            width: 100%;
            height: 100px;
            object-fit: cover;
            border-radius: 8px;
            background-color: #ddd;
        }
        .product-title {
            font-size: 14px;
            font-weight: bold;
            margin: 8px 0 4px 0;
        }
        .product-price {
            color: #e44d26;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 8px;
        }
        .btn-order {
            background-color: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            padding: 8px;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            font-size: 12px;
            font-weight: bold;
        }
        .btn-order:active {
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>ANR NEWS SHOP</h1>
        <p style="margin: 0; font-size: 12px; opacity: 0.8;">សូមជ្រើសរើសផលិតផលដែលអ្នកចង់បាន</p>
    </div>

    <div class="products-grid">
        
        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=200" alt="ស្បែកជើង" class="product-img">
            <div class="product-title">ស្បែកជើងកីឡាទំនើប</div>
            <div class="product-price">$25.00</div>
            <button class="btn-order" onclick="orderProduct('ស្បែកជើងកីឡាទំនើប', '$25.00')">កុម្ម៉ង់ទិញ</button>
        </div>

        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=200" alt="កាស" class="product-img">
            <div class="product-title">កាសប៊្លូធូស Bass ខ្លាំង</div>
            <div class="product-price">$15.00</div>
            <button class="btn-order" onclick="orderProduct('កាសប៊្លូធូស Bass ខ្លាំង', '$15.00')">កុម្ម៉ង់ទិញ</button>
        </div>

        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=200" alt="នាឡិកា" class="product-img">
            <div class="product-title">នាឡិកាដៃឆ្លាតវៃ</div>
            <div class="product-price">$45.00</div>
            <button class="btn-order" onclick="orderProduct('នាឡិកាដៃឆ្លាតវៃ', '$45.00')">កុម្ម៉ង់ទិញ</button>
        </div>

        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1585386959984-a4155224a1ad?w=200" alt="កាបូប" class="product-img">
            <div class="product-title">កាបូបស្ពាយចំហៀង</div>
            <div class="product-price">$12.50</div>
            <button class="btn-order" onclick="orderProduct('កាបូបស្ពាយចំហៀង', '$12.50')">កុម្ម៉ង់ទិញ</button>
        </div>

    </div>

    <script>
        // ចាប់ផ្តើមប្រព័ន្ធ Telegram
        const tg = window.Telegram.WebApp;
        tg.expand(); // ពង្រីកអេក្រង់ឱ្យធំ

        // មុខងារពេលអតិថិជនចុចប៊ូតុងកុម្ម៉ង់
        function orderProduct(name, price) {
            // បង្ហាញផ្ទាំង Alert បញ្ជាក់នៅក្នុង Telegram 
            tg.showPopup({
                title: 'បញ្ជាក់ការបញ្ជាទិញ',
                message: `តើអ្នកពិតជាចង់កុម្ម៉ង់៖ ${name} ដែលមានតម្លៃ ${price} មែនទេ?`,
                buttons: [
                    {id: 'ok', type: 'default', text: 'មែនហើយ កុម្ម៉ង់ទិញ'},
                    {id: 'cancel', type: 'cancel', text: 'បោះបង់'}
                ]
            }, function(buttonId) {
                if (buttonId === 'ok') {
                    // បើគេចុចយល់ព្រម វានឹងផ្ញើសារចូលទៅកាន់ Chat Bot រួចបិទ App
                    tg.sendData(`[កុម្ម៉ង់ទិញ]: ${name} - តម្លៃ: ${price}`);
                }
            });
        }
    </script>
</body>
</html>
