<!DOCTYPE html>
<html>
<head>
    <title>My First Telegram Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; background-color: #f3f3f3; }
        .box { background: white; padding: 20px; display: inline-block; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h1 { color: #2481cc; }
    </style>
</head>
<body>
    <div class="box">
        <h1>ហាងអនឡាញរបស់ខ្ញុំ</h1>
        <p>ស្វាគមន៍មកកាន់ Telegram Mini App ដំបូងបង្អស់របស់ខ្ញុំ!</p>
    </div>
    <script>
        window.Telegram.WebApp.ready();
    </script>
</body>
</html>
